# Welcome to yy!
# 这是网站的全局配置文件，所有内容都已经适配测试开发求职方向

# -------------------------- 网站核心信息（必看） --------------------------
# 网站标题：浏览器标签页显示的内容
title: 杨翌 | 测试开发实习生
# 网站描述：SEO优化+网站副标题，精准命中测试开发岗位关键词
description: 浙江中医药大学数据科学与大数据技术本科，软件设计师中级，专注自动化测试、接口测试、测试工程化，具备支付系统自动化测试实战经验
# 你的名字，全站通用
author:
  name: 杨翌
  email: 3055486732@qq.com
  github: yy-hub2004

# -------------------------- 主题配置（关键！修复构建失败） --------------------------
# 使用 minimal-mistakes 主题，这是修复构建失败的核心
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default" # 可选皮肤: "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# -------------------------- 导航栏配置（控制网站顶部菜单） --------------------------
header_pages:
  - index.md
  - about.md
  - projects.md

# -------------------------- 插件配置（只保留必要的） --------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-octicons
  - jekyll-github-metadata
  - jekyll-paginate

# -------------------------- 其他配置（保持默认即可） --------------------------
paginate: 5
paginate_path: "/page:num/"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# 禁用不必要的功能
use_math: false
google_analytics:
